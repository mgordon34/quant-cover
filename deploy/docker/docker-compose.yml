services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://quant_cover:quant_cover@postgres:5432/quant_cover}
    volumes:
      - ../../apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quant_cover}
      POSTGRES_USER: ${POSTGRES_USER:-quant_cover}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_cover}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
